[meta]
name = "pve-spawning"
version = "0.1.0"
description = "PvE NPC spawning system — spawn rates, difficulty zones, and NPC type configuration for Swarm"
author = "Swarm Team"

[dependencies]

[config]
spawn_interval = { type = "u32", default = 300, description = "Ticks between NPC spawn attempts" }
max_npcs_per_room = { type = "u32", default = 50, description = "Maximum NPCs allowed in a room" }
npc_drone_body = { type = "array<BodyPart>", default = ["Attack", "Move", "Move"], description = "Body parts for spawned NPC drones" }
npc_drop_table = { type = "map<Resource,u32>", default = { Energy = 50 }, description = "Resource drops produced by NPCs" }

[compatibility]
engine_abi_min = "1.0"
